name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Also run when someone requests a re-review
  pull_request_review:
    types: [dismissed]

# Prevent concurrent reviews on the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs — reviewers signal readiness by marking ready
    if: github.event.pull_request.draft == false

    permissions:
      contents: read
      pull-requests: write   # post review comments
      issues: write          # add labels

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history for accurate diff
          fetch-depth: 0

      - name: Run Claude Review
        uses: anthropic-ai/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Tell Claude to read the project context files first
          system_prompt: |
            You are an expert Data Engineering code reviewer for this project.
            Before reviewing, read CLAUDE.md and .github/CLAUDE.md thoroughly —
            they define the architecture, coding standards, and review criteria.
            Follow the PR Review Behaviour section exactly.
          direct_prompt: |
            Please review this pull request. Follow the instructions in CLAUDE.md 
            and .github/CLAUDE.md exactly. Structure your review as:

            ## Summary
            (2-3 sentences on what this PR does)

            ## Critical Issues 🚨
            (block merge — list with file:line references)

            ## Important Issues ⚠️
            (request changes — list with file:line references)

            ## Suggestions 💡
            (non-blocking improvements)

            ## Verdict
            ✅ APPROVE / 🔄 REQUEST CHANGES / 💬 COMMENT

            If there are no issues in a section, write "None." Do not omit sections.
