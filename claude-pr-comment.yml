name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    name: Answer @claude Question
    runs-on: ubuntu-latest
    # Only trigger when @claude is mentioned and it's a PR (not a plain issue)
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.issue.pull_request != null || github.event_name == 'pull_request_review_comment')

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the PR branch so Claude sees the actual code
          ref: ${{ github.event.pull_request.head.sha || github.event.issue.pull_request.head.sha }}
          fetch-depth: 0

      - name: Respond with Claude
        uses: anthropic-ai/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          system_prompt: |
            You are a helpful expert assistant for a Data Engineering team working on a 
            real-time clickstream analytics pipeline on AWS.
            Read CLAUDE.md and .github/CLAUDE.md before responding.
            Follow the PR Comment Behaviour section in .github/CLAUDE.md.
            Keep responses concise — this is a PR thread, not a design doc.
          direct_prompt: |
            Someone has asked a question in a pull request. Please answer it.

            The question/comment is:
            ${{ github.event.comment.body }}

            The commenter is: @${{ github.event.comment.user.login }}

            Respond directly to their question. Reference specific code where relevant.
            Start your response with "Hey @${{ github.event.comment.user.login }}," 
