name: Claude Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  triage:
    name: Triage & Label Issue
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write    # apply labels + post comment

    steps:
      - name: Checkout (for CLAUDE.md context)
        uses: actions/checkout@v4

      - name: Triage with Claude
        uses: anthropic-ai/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          system_prompt: |
            You are a Data Engineering tech lead triaging GitHub issues for the 
            clickstream analytics pipeline. Read CLAUDE.md for full project context.
            Follow the Issue Triage Behaviour in .github/CLAUDE.md exactly.
          direct_prompt: |
            A new issue has been opened. Please triage it.

            Issue Title: ${{ github.event.issue.title }}
            Issue Body:
            ${{ github.event.issue.body }}

            Your tasks:
            1. Reply with a triage comment following the format in .github/CLAUDE.md
            2. In your comment, include a JSON block at the end (so automation can parse it):
            
            ```json
            {
              "labels": ["bug", "priority: high"],
              "good_first_issue": false
            }
            ```

            Use only labels from the approved list in CLAUDE.md.
            Apply at most 3 labels. Always include a priority label.
