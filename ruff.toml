line-length    = 100
target-version = "py312"
src            = ["src", "tests"]

[lint]
select  = ["E", "W", "F", "I", "B", "UP"]
ignore  = ["E501", "B008", "B904", "UP007"]

[lint.per-file-ignores]
"tests/*"                              = ["S101", "F401", "F811"]
"tests/integration/*"                  = ["S101", "F401", "F811", "F821"]  # F821: pytest fixtures look undefined to ruff
"tests/unit/test_spark.py"             = ["F401", "F821", "E402"]  # E402: sys.path insert before pyspark imports
"src/lambda/sessionizer/handler.py"    = ["E402"]  # E402: sys.path must precede imports
