name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

env:
  TF_VERSION: "1.7.0"
  PYTHON_VERSION: "3.12"
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Gate: all tests must pass before deploy ────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt ruff pytest pytest-cov
      - run: ruff check src/ tests/
      - run: pytest tests/unit/ -v --cov=src --cov-fail-under=70

  # ─── Build Lambda zip ───────────────────────────────────────────────────
  build-lambda:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build Lambda zip
        run: bash scripts/build_lambda.sh
      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-sessionizer
          path: src/lambda/sessionizer.zip
          retention-days: 5

  # ─── Deploy dev (on push to main) ────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-lambda
    if: github.ref == 'refs/heads/main'
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-sessionizer
          path: src/lambda/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Select dev workspace
        working-directory: terraform
        run: terraform workspace select dev

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=environments/dev.tfvars -out=dev.tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply dev.tfplan

      - name: Print outputs
        working-directory: terraform
        run: terraform output

  # ─── Deploy prod (manual trigger only) ───────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build-lambda
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-sessionizer
          path: src/lambda/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Select prod workspace
        working-directory: terraform
        run: terraform workspace select prod

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=environments/prod.tfvars -out=prod.tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply prod.tfplan
