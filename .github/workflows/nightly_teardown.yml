name: Nightly Dev Teardown

on:
  schedule:
    # Runs at 11 PM AEST (1 PM UTC) every day — adjust for your timezone
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm teardown"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  teardown-dev:
    name: Destroy Dev Infrastructure
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'destroy')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Destroy dev workspace
        working-directory: terraform
        run: |
          terraform workspace select dev
          terraform destroy -var-file=environments/dev.tfvars -auto-approve

      - name: Destroy default workspace (catches accidental deploys)
        working-directory: terraform
        run: |
          terraform workspace select default
          terraform destroy -var-file=environments/dev.tfvars -auto-approve

      - name: Verify no running resources
        run: |
          echo "Verifying all non-prod resources are destroyed..."
          STREAMS=$(aws kinesis list-streams --query 'StreamNames[?contains(@, `dev`) || contains(@, `default`)]' --output text)
          TABLES=$(aws dynamodb list-tables --query 'TableNames[?contains(@, `dev`) || contains(@, `default`)]' --output text)

          if [ -n "$STREAMS" ] || [ -n "$TABLES" ]; then
            echo "WARNING: Some resources may still exist: streams=$STREAMS tables=$TABLES"
            exit 1
          fi
          echo "✓ All dev/default resources destroyed — cost = $0"
