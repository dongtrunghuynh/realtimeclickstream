name: Nightly Batch Reconciler

on:
  schedule:
    # Runs at midnight AEST (2 PM UTC) — after a day of simulator runs
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to process (YYYY-MM-DD, defaults to yesterday)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  spark-reconcile:
    name: Run Spark Batch Reconciler
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Set processing date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -d yesterday +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init -reconfigure
          terraform workspace select dev
          echo "emr_app_id=$(terraform output -raw emr_application_id)" >> $GITHUB_OUTPUT
          echo "emr_role=$(terraform output -raw emr_execution_role_arn)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw raw_s3_bucket)" >> $GITHUB_OUTPUT

      - name: Export DynamoDB snapshot
        env:
          DYNAMODB_TABLE_NAME: clickstream-sessions-dev
          S3_BUCKET: ${{ steps.tf.outputs.s3_bucket }}
        run: bash scripts/export_dynamodb_snapshot.sh ${{ steps.date.outputs.date }}

      - name: Submit session stitcher
        env:
          EMR_APPLICATION_ID:    ${{ steps.tf.outputs.emr_app_id }}
          EMR_EXECUTION_ROLE_ARN: ${{ steps.tf.outputs.emr_role }}
          S3_BUCKET:             ${{ steps.tf.outputs.s3_bucket }}
        run: bash scripts/submit_spark_job.sh session_stitcher ${{ steps.date.outputs.date }}

      - name: Submit late arrival handler
        env:
          EMR_APPLICATION_ID:    ${{ steps.tf.outputs.emr_app_id }}
          EMR_EXECUTION_ROLE_ARN: ${{ steps.tf.outputs.emr_role }}
          S3_BUCKET:             ${{ steps.tf.outputs.s3_bucket }}
        run: bash scripts/submit_spark_job.sh late_arrival_handler ${{ steps.date.outputs.date }}

      - name: Verify S3 output exists
        env:
          S3_BUCKET: ${{ steps.tf.outputs.s3_bucket }}
        run: |
          DATE=${{ steps.date.outputs.date }}
          YEAR=$(echo $DATE | cut -d- -f1)
          MONTH=$(echo $DATE | cut -d- -f2)
          DAY=$(echo $DATE | cut -d- -f3)
          COUNT=$(aws s3 ls "s3://${S3_BUCKET}-corrected/sessions/year=${YEAR}/month=${MONTH}/day=${DAY}/" \
              --recursive | wc -l)
          echo "Output files: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "No output files found — Spark job may have failed"; exit 1; }
